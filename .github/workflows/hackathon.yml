name: ainos DEPLOY ELIYIREM GAGA

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GHCR_TOKEN }}

    - name: Build and push Frontend image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ghcr.io/${{ secrets.GHCR_USERNAME }}/ainos-frontend:latest
        cache-from: type=gha,scope=frontend
        cache-to: type=gha,mode=max,scope=frontend

    - name: Build and push Backend image
      uses: docker/build-push-action@v5
      with:
        context: ./ainos-backend
        file: ./ainos-backend/Dockerfile
        push: true
        tags: ghcr.io/${{ secrets.GHCR_USERNAME }}/ainos-backend:latest
        cache-from: type=gha,scope=backend
        cache-to: type=gha,mode=max,scope=backend

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup SSH key
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Add server to known hosts
      run: ssh-keyscan -H ${{ vars.DROPLET_IP }} >> ~/.ssh/known_hosts

    - name: Copy docker-compose.yml to droplet
      run: scp -o StrictHostKeyChecking=no docker-compose.yml root@${{ vars.DROPLET_IP }}:~/ainos/

    - name: SSH into server and deploy with Docker Compose
      env:
        SERVER_IP: ${{ vars.DROPLET_IP }}
      run: |
        ssh -o StrictHostKeyChecking=no root@$SERVER_IP << EOF
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            export GHCR_USERNAME="${{ secrets.GHCR_USERNAME }}"
            docker-compose pull
            docker-compose down
            docker-compose up -d --remove-orphans
        EOF

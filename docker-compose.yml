services:
  frontend:
    image: ghcr.io/${GHCR_USERNAME}/ainos-frontend:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped
    networks:
      - ainos-network

  backend:
    image: ghcr.io/${GHCR_USERNAME}/ainos-backend:latest
    build:
      context: ./ainos-backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    restart: unless-stopped
    networks:
      - ainos-network

networks:
  ainos-network:
    driver: bridge
